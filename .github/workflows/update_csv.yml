name: Auto Update Lotto CSV

on:
  schedule:
    # 毎週 月・火・木・金 の日本時間 22:15（UTC 13:15）に自動実行
    - cron: '15 13 * * 1,2,4,5'
  workflow_dispatch: # GitHubの画面から手動でいつでも実行できるボタンを追加

jobs:
  update-csv:
    runs-on: ubuntu-latest
    
    steps:
    - name: リポジトリをチェックアウト
      uses: actions/checkout@v4

    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests beautifulsoup4

    - name: CSV更新スクリプトの実行
      run: python updater.py

    - name: 変更があった場合にGitHubへ自動コミット・プッシュ
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *.csv
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Auto] 最新の抽選結果をCSVに反映しました"
          git push
        else
          echo "新しい抽選結果はまだありません。変更なしで終了します。"
        fi
